<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur Thalès Expert - Medi09</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --light: #ecf0f1; --orange: #e67e22; --danger: #e74c3c; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 1000px; width: 100%; text-align: center; }
        .mode-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .mode-btn { padding: 8px 15px; border: 2px solid var(--primary); background: white; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .mode-btn.active { background: var(--primary); color: white; }
        
        #nom-eleve-container { margin-bottom: 15px; display: none; background: #f3e5f5; padding: 15px; border-radius: 8px; border: 1px solid var(--purple); }
        .input-nom { padding: 10px; border-radius: 5px; border: 2px solid var(--purple); width: 250px; font-size: 1rem; text-align: center; }

        .opt-container { margin-bottom: 15px; background: var(--light); padding: 10px; border-radius: 8px; font-weight: bold; display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; }
        
        .print-cols { display: grid; gap: 30px; width: 100%; margin-top: 20px; }
        .cols-1 { grid-template-columns: 1fr; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        .cols-3 { grid-template-columns: 1fr 1fr 1fr; }

        .exo-block { border: 1px solid #eee; padding: 20px; border-radius: 10px; page-break-inside: avoid; background: white; position: relative; }
        .svg-wrap { width: 100%; display: flex; justify-content: center; background: #fff; border-radius: 8px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        button.action { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-gen { background: var(--accent); color: white; }
        .btn-ans { background: var(--success); color: white; }
        .btn-print { background: var(--primary); color: white; }
        
        .answer-zone { margin: 15px 0; padding: 15px; border-top: 2px dashed #ccc; }
        .user-input { padding: 10px; border: 2px solid var(--primary); border-radius: 5px; width: 120px; font-size: 1rem; text-align: center; }
        .feedback { font-weight: bold; margin-top: 10px; min-height: 24px; }
        
        .enonce { font-size: 1.1rem; line-height: 1.6; margin: 15px 0; text-align: left; border-left: 5px solid var(--primary); padding-left: 15px; }
        .solution { display: none; margin-top: 15px; padding: 20px; background: #f0fff4; border-radius: 10px; text-align: left; border: 1px solid var(--success); line-height: 1.8; }

        .tri-small { fill: rgba(52, 152, 219, 0.2); visibility: hidden; }
        .tri-big { fill: rgba(39, 174, 96, 0.1); visibility: hidden; }
        .show-colors .tri-small, .show-colors .tri-big { visibility: visible; }
        .shape-line { stroke: var(--primary); stroke-width: 2.5; fill: none; }
        .parallel-line { stroke: #e74c3c; stroke-width: 3; }
        .label-point { font-weight: bold; font-size: 20px; fill: var(--primary); font-family: serif; }
        .measure-text { fill: var(--orange); font-size: 18px; font-weight: bold; }

        #exam-result { display: none; font-size: 1.5rem; font-weight: bold; color: #8e44ad; margin: 20px; padding: 15px; border: 3px solid #8e44ad; border-radius: 10px; }

        @media print {
            body { background: white; padding: 0; }
            .mode-selector, .opt-container, .controls, .answer-zone, #nom-eleve-container { display: none !important; }
            body.print-with-solution .solution { display: block !important; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('emboite', this)">Emboîté</button>
        <button class="mode-btn" onclick="setMode('papillon', this)">Papillon</button>
        <button class="mode-btn" onclick="setMode('reciproque', this)">Réciproque</button>
        <button class="mode-btn btn-exam" onclick="startExam(this)">🎓 Mode Examen</button>
    </div>

    <div id="nom-eleve-container">
        <label><strong>Nom de l'élève :</strong></label><br>
        <input type="text" id="nom-eleve" class="input-nom" placeholder="Prénom NOM">
    </div>

    <div id="exam-result"></div>

    <div class="opt-container">
        <label><input type="checkbox" id="checkColor" onchange="generateSheet()"> 🎨 Couleur</label>
        <label><input type="checkbox" id="printSolution" onchange="updatePrintSolution()"> ✅ Imprimer Corrigé</label>
        <span style="margin-left:10px">Colonnes :</span>
        <select id="colSelect" onchange="updateLayout()">
            <option value="1">1</option><option value="2" selected>2</option><option value="3">3</option>
        </select>
        <span style="margin-left:10px">Quantité :</span>
        <select id="exoQty">
            <option value="1">1</option><option value="4">4</option><option value="6" selected>6</option><option value="8">8</option>
        </select>
    </div>

    <div class="controls">
        <button id="btn-gen-main" class="action btn-gen" onclick="generateSheet()">🔄 Générer</button>
        <button id="btn-ans-main" class="action btn-ans" onclick="toggleAllSolutions()">👁️ Voir Corrigés</button>
        <button class="action btn-print" onclick="window.print()">Imprimer 🖨️</button>
        <button id="btn-submit-exam" class="action btn-ans" style="display:none; background:#8e44ad" onclick="finishExam()">Terminer l'examen</button>
    </div>

    <div id="print-wrapper" class="print-cols cols-2"></div>
</div>

<script>
const WEB_APP_URL = "TON_URL_ICI"; 

let currentMode = 'emboite';
let answersMap = {}; 
let isExam = false;

function setMode(m, b) {
    isExam = false; currentMode = m;
    document.getElementById('nom-eleve-container').style.display = 'none';
    document.getElementById('btn-submit-exam').style.display = 'none';
    document.getElementById('btn-gen-main').style.display = 'inline-block';
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active');
    generateSheet();
}

function startExam(btn) {
    isExam = true; currentMode = 'examen';
    document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('nom-eleve-container').style.display = 'block';
    document.getElementById('btn-submit-exam').style.display = 'inline-block';
    document.getElementById('btn-gen-main').style.display = 'none';
    generateSheet();
}

function updateLayout() { document.getElementById('print-wrapper').className = 'print-cols cols-' + document.getElementById('colSelect').value; }
function updatePrintSolution() { document.body.classList.toggle('print-with-solution', document.getElementById('printSolution').checked); }
function toggleAllSolutions() {
    const sols = document.querySelectorAll('.solution');
    if (sols.length === 0) return;
    const target = sols[0].style.display === 'block' ? 'none' : 'block';
    sols.forEach(s => s.style.display = target);
}

function getLetters() { return "ABCDEFGHJKLMNPQRSTUVWXYZ".split("").sort(() => Math.random() - 0.5).slice(0, 5); }

function generateSheet() {
    const qty = isExam ? 6 : parseInt(document.getElementById('exoQty').value);
    const wrapper = document.getElementById('print-wrapper');
    wrapper.innerHTML = ''; answersMap = {};

    for (let i = 0; i < qty; i++) {
        const exoDiv = document.createElement('div');
        exoDiv.className = 'exo-block';
        let subMode = isExam ? ((i % 2 === 0) ? 'emboite' : 'reciproque') : currentMode;
        
        exoDiv.innerHTML = `
            <div class="svg-wrap"><svg id="svg-${i}" width="400" height="320" viewBox="0 0 500 400"><g id="group-${i}"></g></svg></div>
            <div id="enonce-${i}" class="enonce"></div>
            <div class="answer-zone">
                <input type="text" class="user-input" id="input-${i}" placeholder="Réponse">
                ${!isExam ? `<button class="action" style="padding:5px 10px; background:var(--primary); color:white" onclick="checkSingleAnswer(${i})">OK</button>` : ''}
                <div id="fb-${i}" class="feedback"></div>
            </div>
            <div id="sol-${i}" class="solution"></div>`;
        wrapper.appendChild(exoDiv);
        createExoLogic(i, subMode);
    }
    MathJax.typesetPromise();
}

function createExoLogic(id, mode) {
    const group = document.getElementById('group-' + id);
    const rot = Math.floor(Math.random() * 20) - 10;
    group.setAttribute("transform", `rotate(${rot}, 250, 200)`);
    if(document.getElementById('checkColor').checked) group.parentElement.classList.add('show-colors');
    const L = getLetters();
    if (mode === 'reciproque') setupReciproque(id, L, rot); else setupThales(id, L, rot, mode);
}

function setupThales(id, L, rot, mode) {
    const k = (1.5 + Math.random() * 0.5).toFixed(1);
    const v1 = (3 + Math.random() * 2).toFixed(1);
    const v1L = (v1 * k).toFixed(1);
    const v2 = (3 + Math.random() * 2).toFixed(1);
    const v2L = (v2 * k).toFixed(1);
    const bS = (4 + Math.random() * 2).toFixed(1);
    const bL = (bS * k).toFixed(1);

    answersMap[id] = { val: v1, type: 'calcul' };
    document.getElementById('enonce-'+id).innerHTML = `(${L[1]}${L[2]}) // (${L[3]}${L[4]}). Calcule $${L[0]}${L[1]}$.`;
    
    document.getElementById('sol-'+id).innerHTML = `<b>Corrigé :</b> D'après Thalès, $${L[0]}${L[1]} = ${v1}$.`;

    const g = document.getElementById('group-'+id);
    if(mode === 'emboite') drawEmb(g, L, rot, "?", v1L, v2, v2L, bS, bL);
    else drawPap(g, L, rot, "?", v1L, v2, v2L, bS, bL);
}

function setupReciproque(id, L, rot) {
    const ok = Math.random() > 0.5;
    const v1 = 4, v1L = 8, v2 = 5, v2L = ok ? 10 : 12;
    answersMap[id] = { val: ok ? "oui" : "non", type: 'reciproque' };
    document.getElementById('enonce-'+id).innerHTML = `Les droites $(${L[1]}${L[2]})$ et $(${L[3]}${L[4]})$ sont-elles parallèles ?`;
    document.getElementById('sol-'+id).innerHTML = `<b>Corrigé :</b> ${ok ? "Oui (Rapports égaux)" : "Non (Rapports différents)"}`;
    drawEmb(document.getElementById('group-'+id), L, rot, v1, v1L, v2, v2L, "", "");
}

function checkSingleAnswer(id) {
    const val = document.getElementById('input-'+id).value.toLowerCase().trim();
    const isOk = val.includes(answersMap[id].val);
    document.getElementById('fb-'+id).innerHTML = isOk ? "✅" : "❌";
    return isOk;
}

function drawEmb(g, L, rot, m1, m1L, m2, m2L, bS, bL) {
    const Ax=250, Ay=80, Dx=150, Dy=350, Ex=350, Ey=350;
    const Bx=Ax+(Dx-Ax)*0.6, By=Ay+(Dy-Ay)*0.6, Cx=Ax+(Ex-Ax)*0.6, Cy=Ay+(Ey-Ay)*0.6;
    
    g.innerHTML = `
        <polygon points="${Ax},${Ay} ${Dx},${Dy} ${Ex},${Ey}" class="tri-big"/>
        <polygon points="${Ax},${Ay} ${Bx},${By} ${Cx},${Cy}" class="tri-small"/>
        <path d="M ${Ax} ${Ay} L ${Dx} ${Dy} L ${Ex} ${Ey} Z" class="shape-line"/>
        <line x1="${Bx}" y1="${By}" x2="${Cx}" y2="${Cy}" class="parallel-line"/>`;
    
    addTxt(g, rot, Ax, Ay, L[0], "label-point", 0, -25);
    addTxt(g, rot, Bx, By, L[1], "label-point", -25, 0); 
    addTxt(g, rot, Cx, Cy, L[2], "label-point", 25, 0);
    addTxt(g, rot, Dx, Dy, L[3], "label-point", -25, 25); 
    addTxt(g, rot, Ex, Ey, L[4], "label-point", 25, 25);
    
    addTxt(g, rot, (Ax+Bx)/2, (Ay+By)/2, m1, "measure-text", -35, 0);
    addTxt(g, rot, (Ax+Dx)/2, (Ay+Dy)/2, m1L, "measure-text", -70, 0); 
    addTxt(g, rot, (Ax+Cx)/2, (Ay+Cy)/2, m2, "measure-text", 35, 0);
    addTxt(g, rot, (Ax+Ex)/2, (Ay+Ey)/2, m2L, "measure-text", 70, 0);
}

function drawPap(g, L, rot, m1, m1L, m2, m2L, bS, bL) {
    const Ax=250, Ay=200, Bx=170, By=120, Cx=330, Cy=120, Dx=350, Dy=300, Ex=150, Ey=300;
    g.innerHTML = `
        <polygon points="${Ax},${Ay} ${Bx},${By} ${Cx},${Cy}" class="tri-small"/>
        <polygon points="${Ax},${Ay} ${Dx},${Dy} ${Ex},${Ey}" class="tri-big"/>
        <line x1="${Bx}" y1="${By}" x2="${Dx}" y2="${Dy}" class="shape-line"/>
        <line x1="${Cx}" y1="${Cy}" x2="${Ex}" y2="${Ey}" class="shape-line"/>
        <line x1="${Bx}" y1="${By}" x2="${Cx}" y2="${Cy}" class="parallel-line"/>
        <line x1="${Ex}" y1="${Ey}" x2="${Dx}" y2="${Dy}" class="parallel-line"/>`;

    addTxt(g, rot, Ax, Ay, L[0], "label-point", 25, 0);
    addTxt(g, rot, Bx, By, L[1], "label-point", -20, -20);
    addTxt(g, rot, Cx, Cy, L[2], "label-point", 20, -20);
    addTxt(g, rot, Dx, Dy, L[3], "label-point", 20, 20);
    addTxt(g, rot, Ex, Ey, L[4], "label-point", -20, 20);

    addTxt(g, rot, (Ax+Bx)/2, (Ay+By)/2, m1, "measure-text", -35, -10);
    addTxt(g, rot, (Ax+Dx)/2, (Ay+Dy)/2, m1L, "measure-text", 40, 10);
    addTxt(g, rot, (Ax+Cx)/2, (Ay+Cy)/2, m2, "measure-text", 35, -10);
    addTxt(g, rot, (Ax+Ex)/2, (Ay+Ey)/2, m2L, "measure-text", -40, 10);
}

function addTxt(g, rot, x, y, val, cls, ox, oy) {
    if(!val) return;
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", x + ox); t.setAttribute("y", y + oy);
    t.setAttribute("class", cls); t.setAttribute("text-anchor", "middle");
    t.setAttribute("transform", `rotate(${-rot}, ${x + ox}, ${y + oy})`);
    t.textContent = val; g.appendChild(t);
}

generateSheet();
</script>
</body>
</html>
