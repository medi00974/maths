<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Distributivité - Medi09</title>
    <script>
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$']], 
                displayMath: [['$$', '$$']],
                macros: {
                    red: ["{\\color{red}{#1}}", 1]
                }
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-top: 0; }
        
        .menu { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; background: #f0f2f5; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #ddd; }
        .menu-item { display: flex; flex-direction: column; gap: 5px; font-weight: bold; }
        select, input[type="number"] { padding: 8px; border-radius: 5px; border: 1px solid #ccc; background: white; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gen { background: var(--accent); color: white; }
        .btn-print { background: var(--primary); color: white; }
        .btn-sol { background: var(--success); color: white; }

        .exo-grid { display: grid; gap: 20px; margin-top: 20px; }
        .cols-1 { grid-template-columns: 1fr; }
        .cols-2 { grid-template-columns: 1fr 1fr; }

        .exo-card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: #fff; page-break-inside: avoid; }
        .exo-header { font-weight: bold; color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .exo-expression { font-size: 1.3rem; margin: 10px 0; }
        
        .input-zone { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        .user-input { padding: 8px; width: 180px; border: 2px solid var(--accent); border-radius: 5px; font-size: 0.9rem; }
        .feedback { font-weight: bold; font-size: 0.9rem; }

        .solution { display: none; margin-top: 15px; padding: 12px; background: #fafff0; border: 1px solid #d4e0b5; border-radius: 4px; }
        .sol-table { margin: 10px 0; overflow-x: auto; }

        /* Gestion de l'impression */
        @media print {
            .menu, .input-zone, .btn, .feedback { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; width: 100%; padding: 0; }
            .exo-card { border: 1px solid #ccc; margin-bottom: 10px; }
            
            /* Cache la solution sauf si la checkbox est cochée */
            .solution { display: none; background: transparent; }
            body.print-solutions .solution { display: block !important; }
        }
    </style>
</head>
<body id="main-body">

<div class="container">
    <h1>MathGen : Distributivité (Mode Tableau)</h1>

    <div class="menu">
        <div class="menu-item">
            <label>Type :</label>
            <select id="typeExo">
                <option value="simple">Distributivité Simple</option>
                <option value="double">Distributivité Double & Carrés</option>
            </select>
        </div>
        <div class="menu-item">
            <label>Exercices :</label>
            <input type="number" id="nbExo" value="4" min="1" max="10">
        </div>
        <div class="menu-item">
            <label>Colonnes :</label>
            <select id="nbCols">
                <option value="1">1 Colonne</option>
                <option value="2" selected>2 Colonnes</option>
            </select>
        </div>
        <div class="menu-item" style="justify-content: center; align-items: center; cursor: pointer;">
            <label style="cursor: pointer;"><input type="checkbox" id="checkPrintSol" onchange="togglePrintClass()"> Imprimer la correction</label>
        </div>
        <div style="align-self: flex-end; display: flex; gap: 8px;">
            <button class="btn btn-gen" onclick="generate()">🔄 Générer</button>
            <button class="btn btn-sol" onclick="toggleAllSolutions()">👁️ Voir Corrigés</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Imprimer</button>
        </div>
    </div>

    <div id="exo-grid" class="exo-grid cols-2"></div>
</div>

<script>
let currentSolutions = [];

// Fonction pour activer/désactiver l'impression des solutions via une classe sur le body
function togglePrintClass() {
    const isChecked = document.getElementById('checkPrintSol').checked;
    if(isChecked) {
        document.getElementById('main-body').classList.add('print-solutions');
    } else {
        document.getElementById('main-body').classList.remove('print-solutions');
    }
}

function generate() {
    const type = document.getElementById('typeExo').value;
    const nb = Math.min(document.getElementById('nbExo').value, 10);
    const cols = document.getElementById('nbCols').value;
    const grid = document.getElementById('exo-grid');
    
    grid.innerHTML = '';
    grid.className = `exo-grid cols-${cols}`;
    currentSolutions = [];

    for (let i = 0; i < nb; i++) {
        let exo;
        if (type === 'simple') {
            exo = generateSimple();
        } else {
            exo = Math.random() > 0.4 ? generateDouble() : generateIdentite();
        }
        
        currentSolutions.push(exo.final);
        
        const card = document.createElement('div');
        card.className = 'exo-card';
        card.innerHTML = `
            <div class="exo-header">Question ${i + 1}</div>
            <div class="exo-expression">$D = ${exo.enonce}$</div>
            <div class="input-zone">
                <input type="text" class="user-input" id="input-${i}" placeholder="Réponse réduite">
                <button class="btn btn-gen" style="padding:5px 10px; font-size:0.8rem;" onclick="check(${i})">OK</button>
                <span id="fb-${i}" class="feedback"></span>
            </div>
            <div id="sol-${i}" class="solution">
                <strong>Méthode du tableau :</strong>
                <div class="sol-table">$$${exo.tableau}$$</div>
                <strong>Résultat final réduit :</strong>
                $D = ${exo.final}$
            </div>
        `;
        grid.appendChild(card);
    }
    MathJax.typeset();
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function formatTerm(c, power, isFirst = false) {
    if (c === 0) return "";
    let res = c > 0 ? (isFirst ? "" : " + ") : (isFirst ? "-" : " - ");
    let absC = Math.abs(c);
    if (absC !== 1 || power === 0) res += absC;
    if (power > 0) res += "x";
    if (power > 1) res += "^2";
    return res;
}

function r(val) { return `\\color{red}{${val}}`; }

function generateSimple() {
    let a = rand(-9, 9); if (a === 0) a = 1;
    let b = rand(-9, 9); if (b === 0) b = 2;
    let c = rand(-9, 9);
    let tab = `\\begin{array}{|c|c|c|} \\hline \\times & ${b}x & ${c} \\\\ \\hline ${a} & ${r(a*b + "x")} & ${r(a*c)} \\\\ \\hline \\end{array}`;
    return {
        enonce: `${a}(${formatTerm(b, 1, true)}${formatTerm(c, 0)})`,
        tableau: tab,
        final: `${formatTerm(a*b, 1, true)}${formatTerm(a*c, 0)}`
    };
}

function generateDouble() {
    let a = rand(-5, 5); if (a === 0) a = 1;
    let b = rand(-9, 9);
    let c = rand(-5, 5); if (c === 0) c = 2;
    let d = rand(-9, 9);
    let tab = `\\begin{array}{|c|c|c|} \\hline \\times & ${c}x & ${d} \\\\ \\hline ${a}x & ${r(a*c + "x^2")} & ${r(a*d + "x")} \\\\ \\hline ${b} & ${r(b*c + "x")} & ${r(b*d)} \\\\ \\hline \\end{array}`;
    let final = `${formatTerm(a*c, 2, true)}${formatTerm(a*d + b*c, 1)}${formatTerm(b*d, 0)}`;
    return {
        enonce: `(${formatTerm(a, 1, true)}${formatTerm(b, 0)})(${formatTerm(c, 1, true)}${formatTerm(d, 0)})`,
        tableau: tab,
        final: final
    };
}

function generateIdentite() {
    let a = rand(1, 5);
    let b = rand(-9, 9);
    let tab = `\\begin{array}{|c|c|c|} \\hline \\times & ${a}x & ${b} \\\\ \\hline ${a}x & ${r(a*a + "x^2")} & ${r(a*b + "x")} \\\\ \\hline ${b} & ${r(b*a + "x")} & ${r(b*b)} \\\\ \\hline \\end{array}`;
    let final = `${formatTerm(a*a, 2, true)}${formatTerm(2*a*b, 1)}${formatTerm(b*b, 0)}`;
    return {
        enonce: `(${formatTerm(a, 1, true)}${formatTerm(b, 0)})^2`,
        tableau: tab,
        final: final
    };
}

function check(id) {
    let userVal = document.getElementById(`input-${id}`).value.toLowerCase().replace(/\s/g, '');
    let correctVal = currentSolutions[id].replace(/\s/g, '').replace('$', '');
    if (userVal.startsWith('+')) userVal = userVal.substring(1);
    let target = correctVal;
    if (target.startsWith('+')) target = target.substring(1);
    let fb = document.getElementById(`fb-${id}`);
    if (userVal === target) {
        fb.innerHTML = "✅"; fb.style.color = "var(--success)";
    } else {
        fb.innerHTML = "❌"; fb.style.color = "var(--danger)";
    }
}

function toggleAllSolutions() {
    const sols = document.querySelectorAll('.solution');
    sols.forEach(s => {
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    });
}

generate();
</script>
</body>
</html>
