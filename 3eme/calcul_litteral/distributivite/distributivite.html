<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Distributivité - Combo - Medi09</title>
    <script>
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$']], 
                displayMath: [['$$', '$$']],
                macros: {
                    red: ["{\\color{red}{#1}}", 1]
                }
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-top: 0; }
        .menu { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; background: #f0f2f5; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #ddd; }
        .menu-item { display: flex; flex-direction: column; gap: 5px; font-weight: bold; }
        select, input[type="number"] { padding: 8px; border-radius: 5px; border: 1px solid #ccc; background: white; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gen { background: var(--accent); color: white; }
        .btn-print { background: var(--primary); color: white; }
        .btn-sol { background: var(--success); color: white; }
        .exo-grid { display: grid; gap: 20px; margin-top: 20px; }
        .cols-1 { grid-template-columns: 1fr; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        .exo-card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: #fff; page-break-inside: avoid; }
        .exo-header { font-weight: bold; color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .exo-expression { font-size: 1.2rem; margin: 10px 0; word-wrap: break-word; }
        .input-zone { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        .user-input { padding: 8px; width: 220px; border: 2px solid var(--accent); border-radius: 5px; font-size: 0.9rem; }
        .solution { display: none; margin-top: 15px; padding: 12px; background: #fafff0; border: 1px solid #d4e0b5; border-radius: 4px; font-size: 0.95rem; }
        @media print {
            .menu, .input-zone, .btn { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; width: 100%; padding: 0; }
            body.print-solutions .solution { display: block !important; }
        }
    </style>
</head>
<body id="main-body">

<div class="container">
    <h1>Distributivité : Les Défis</h1>
    <div class="menu">
        <div class="menu-item">
            <label>Type :</label>
            <select id="typeExo">
                <option value="mix_combo">Expressions Mixtes (Simple + Double)</option>
                <option value="simple">Distributivité Simple</option>
                <option value="double">Distributivité Double</option>
            </select>
        </div>
        <div class="menu-item">
            <label>Exercices :</label>
            <input type="number" id="nbExo" value="3" min="1" max="10">
        </div>
        <div class="menu-item">
            <label>Colonnes :</label>
            <select id="nbCols">
                <option value="1">1 Colonne</option>
                <option value="2" selected>2 Colonnes</option>
            </select>
        </div>
        <div class="menu-item">
            <label style="cursor: pointer;"><input type="checkbox" id="checkPrintSol" onchange="togglePrintClass()"> Inclure la correction</label>
        </div>
        <div style="align-self: flex-end; display: flex; gap: 8px;">
            <button class="btn btn-gen" onclick="generate()">🔄 Générer</button>
            <button class="btn btn-sol" onclick="toggleAllSolutions()">👁️ Voir Corrigés</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Imprimer</button>
        </div>
    </div>
    <div id="exo-grid" class="exo-grid cols-2"></div>
</div>

<script>
let currentSolutions = [];

function togglePrintClass() {
    document.getElementById('main-body').classList.toggle('print-solutions', document.getElementById('checkPrintSol').checked);
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function formatTerm(c, power, isFirst = false) {
    if (c === 0) return "";
    let res = c > 0 ? (isFirst ? "" : " + ") : (isFirst ? "-" : " - ");
    let absC = Math.abs(c);
    if (absC !== 1 || power === 0) res += absC;
    if (power > 0) res += "x";
    if (power > 1) res += "^2";
    return res;
}

function generate() {
    const type = document.getElementById('typeExo').value;
    const nb = document.getElementById('nbExo').value;
    const grid = document.getElementById('exo-grid');
    grid.innerHTML = '';
    grid.className = "exo-grid cols-" + document.getElementById('nbCols').value;
    currentSolutions = [];

    for (let i = 0; i < nb; i++) {
        let exo = (type === 'mix_combo') ? generateCombo() : (type === 'simple' ? generateSimple() : generateDouble());
        currentSolutions.push(exo.final);
        
        const card = document.createElement('div');
        card.className = 'exo-card';
        card.innerHTML = `
            <div class="exo-header">Question ${i + 1}</div>
            <div class="exo-expression">$E = ${exo.enonce}$</div>
            <div class="input-zone">
                <input type="text" class="user-input" id="input-${i}" placeholder="Réponse réduite">
                <button class="btn btn-gen" style="padding:5px 10px; font-size:0.8rem;" onclick="check(${i})">OK</button>
                <span id="fb-${i}"></span>
            </div>
            <div id="sol-${i}" class="solution">
                <strong>Étapes de correction LaTeX :</strong>
                $$ \\begin{aligned} 
                E &= ${exo.enonce} \\\\
                E &= (${exo.devSimple}) + (${exo.devDouble}) \\\\
                E &= \\mathbf{${exo.final}} 
                \\end{aligned} $$
            </div>
        `;
        grid.appendChild(card);
    }
    MathJax.typeset();
}

function generateSimple() {
    let a = rand(-5, 5); if(a===0) a=2;
    let b = rand(-5, 5); if(b===0) b=1;
    let c = rand(-9, 9);
    let final = formatTerm(a*b, 1, true) + formatTerm(a*c, 0);
    return { enonce: `${a}(${formatTerm(b, 1, true)}${formatTerm(c, 0)})`, devSimple: final, devDouble: "0", final };
}

function generateDouble() {
    let a = rand(-4, 4); if(a===0) a=1;
    let b = rand(-5, 5);
    let c = rand(-4, 4); if(c===0) c=2;
    let d = rand(-5, 5);
    let final = formatTerm(a*c, 2, true) + formatTerm(a*d + b*c, 1) + formatTerm(b*d, 0);
    return { enonce: `(${formatTerm(a, 1, true)}${formatTerm(b, 0)})(${formatTerm(c, 1, true)}${formatTerm(d, 0)})`, devSimple: "0", devDouble: final, final };
}

function generateCombo() {
    // Partie Simple : k(ax + b)
    let k = rand(-5, 5); if(k===0) k=3;
    let sa = rand(-4, 4); if(sa===0) sa=1;
    let sb = rand(-9, 9);
    let part1_enonce = `${k}(${formatTerm(sa, 1, true)}${formatTerm(sb, 0)})`;
    let part1_dev = formatTerm(k*sa, 1, true) + formatTerm(k*sb, 0);

    // Partie Double : (cx + d)(ex + f)
    let c = rand(-3, 3); if(c===0) c=1;
    let d = rand(-5, 5);
    let e = rand(-3, 3); if(e===0) e=2;
    let f = rand(-5, 5);
    let part2_enonce = `(${formatTerm(c, 1, true)}${formatTerm(d, 0)})(${formatTerm(e, 1, true)}${formatTerm(f, 0)})`;
    let part2_dev = formatTerm(c*e, 2, true) + formatTerm(c*f + d*e, 1) + formatTerm(d*f, 0);

    // Fusion
    let finalX2 = c*e;
    let finalX1 = (k*sa) + (c*f + d*e);
    let finalC = (k*sb) + (d*f);
    
    let finalRes = formatTerm(finalX2, 2, true) + formatTerm(finalX1, 1, finalX2===0) + formatTerm(finalC, 0, (finalX2===0 && finalX1===0));

    return {
        enonce: part1_enonce + " + " + part2_enonce,
        devSimple: part1_dev,
        devDouble: part2_dev,
        final: finalRes || "0"
    };
}

function check(id) {
    let u = document.getElementById(`input-${id}`).value.replace(/\s/g, '').toLowerCase();
    let s = currentSolutions[id].replace(/\s/g, '').toLowerCase();
    document.getElementById(`fb-${id}`).innerHTML = (u === s || u === "+"+s) ? " ✅" : " ❌";
}

function toggleAllSolutions() {
    document.querySelectorAll('.solution').forEach(s => s.style.display = (s.style.display === 'block' ? 'none' : 'block'));
}

generate();
</script>
</body>
</html>
