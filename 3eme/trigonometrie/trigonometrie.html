<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Trigonométrie Expert - Medi09</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 700px; width: 100%; text-align: center; }
        
        .angle-hat { position: relative; display: inline-block; padding-top: 5px; font-weight: bold; }
        .angle-hat::before { content: "^"; position: absolute; top: -8px; left: 50%; transform: translateX(-50%) scaleX(2.5); font-size: 1.2rem; }

        .mode-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .mode-btn { padding: 12px 20px; border: 2px solid var(--accent); background: white; cursor: pointer; border-radius: 8px; font-weight: bold; color: var(--accent); transition: 0.3s; margin: 5px; }
        .mode-btn.active { background: var(--accent); color: white; }

        .controls { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; }
        button.action { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-sol { background: var(--success); color: white; }

        #svg-container { background: white; border: 1px solid #eee; border-radius: 10px; margin: 20px 0; padding: 20px; display: flex; justify-content: center; min-height: 320px; }
        .enonce { text-align: left; border-left: 5px solid var(--accent); padding: 15px; background: #fff; border: 1px solid #ddd; margin: 20px 0; font-size: 1.1rem; line-height: 1.6; }
        .solution { display: none; text-align: left; padding: 15px; background: #f0fff4; border: 1px solid var(--success); border-radius: 10px; line-height: 1.8; }
        
        .triangle-path { fill: #fcfcfc; stroke: var(--primary); stroke-width: 3; stroke-linejoin: round; }
        .label-svg { font-weight: bold; font-size: 20px; fill: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <h1>📐 Mission Trigonométrie</h1>

    <div class="mode-selector">
        <button id="btn-longueur" class="mode-btn active" onclick="setMode('longueur')">Calculer une longueur</button>
        <button id="btn-angle" class="mode-btn" onclick="setMode('angle')">Calculer un angle</button>
        <button id="btn-mixte" class="mode-btn" onclick="setMode('mixte')">Mode Mélange (Aléatoire)</button>
    </div>
    
    <div class="controls">
        <button class="action btn-gen" onclick="generate()">🔄 Nouveau Défi</button>
        <button class="action btn-sol" onclick="toggleSolution()">👁️ Voir le corrigé</button>
    </div>

    <div id="svg-container">
        <svg id="trigo-svg" width="320" height="320" viewBox="0 0 320 320"></svg>
    </div>

    <div id="enonce" class="enonce">Prêt ? Analysez l'énoncé pour trouver l'angle.</div>
    <div id="solution" class="solution"></div>
</div>

<script>
let currentMode = 'longueur';
let cur = {}; 
const sets = ["ABC", "RST", "IJK", "LMN", "DEF", "PQR"];

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + mode).classList.add('active');
}

function generate() {
    document.getElementById('solution').style.display = 'none';
    
    let effectiveMode = currentMode;
    if (currentMode === 'mixte') {
        effectiveMode = Math.random() < 0.5 ? 'longueur' : 'angle';
    }

    const letters = sets[Math.floor(Math.random() * sets.length)].split('');
    const S1 = letters[0], S2 = letters[1], S3 = letters[2]; 
    
    const fn = ['cos', 'sin', 'tan'][Math.floor(Math.random() * 3)];
    let ang = Math.floor(Math.random() * 36) + 22; 
    let adj = Math.floor(Math.random() * 6) + 4; 
    let hyp = (adj / Math.cos(ang * Math.PI / 180)).toFixed(1);
    let opp = (adj * Math.tan(ang * Math.PI / 180)).toFixed(1);

    cur = { S1, S2, S3, fn, ang, adj, hyp, opp };
    
    const hat = `<span class="angle-hat">${S1}${S3}${S2}</span>`;
    let txt = `Le triangle ${S1}${S2}${S3} est rectangle en ${S1}.<br>`;
    let sol = `<b>Méthode SOH CAH TOA :</b><br>Dans le triangle ${S1}${S2}${S3} rectangle en ${S1} :<br>`;

    if (effectiveMode === 'longueur') {
        if (fn === 'cos') {
            txt += `On donne <b>${S1}${S3} = ${adj} cm</b> (adjacent) et ${hat} = ${ang}°. <br>Calcule la longueur de l'hypoténuse <b>${S2}${S3}</b> au dixième.`;
            sol += `cos(${hat}) = ${S1}${S3} / ${S2}${S3}<br>cos(${ang}°) = ${adj} / ${S2}${S3}<br>${S2}${S3} = ${adj} / cos(${ang}°) ≈ <b>${hyp} cm</b>`;
        } else if (fn === 'sin') {
            txt += `On donne <b>${S2}${S3} = ${hyp} cm</b> (hypoténuse) et ${hat} = ${ang}°. <br>Calcule la longueur du côté opposé <b>${S1}${S2}</b> au dixième.`;
            sol += `sin(${hat}) = ${S1}${S2} / ${S2}${S3}<br>sin(${ang}°) = ${S1}${S2} / ${hyp}<br>${S1}${S2} = ${hyp} × sin(${ang}°) ≈ <b>${opp} cm</b>`;
        } else {
            txt += `On donne <b>${S1}${S3} = ${adj} cm</b> (adjacent) et ${hat} = ${ang}°. <br>Calcule la longueur du côté opposé <b>${S1}${S2}</b> au dixième.`;
            sol += `tan(${hat}) = ${S1}${S2} / ${S1}${S3}<br>tan(${ang}°) = ${S1}${S2} / ${adj}<br>${S1}${S2} = ${adj} × tan(${ang}°) ≈ <b>${opp} cm</b>`;
        }
    } else {
        if (fn === 'cos') {
            txt += `On donne <b>${S1}${S3} = ${adj} cm</b> (adjacent) et <b>${S2}${S3} = ${hyp} cm</b> (hypoténuse). <br>Calcule la mesure de l'angle ${hat} au degré près.`;
            sol += `cos(${hat}) = ${S1}${S3} / ${S2}${S3} = ${adj} / ${hyp}<br>Angle = arccos(${adj}/${hyp}) ≈ <b>${ang}°</b>`;
        } else if (fn === 'sin') {
            txt += `On donne <b>${S1}${S2} = ${opp} cm</b> (opposé) et <b>${S2}${S3} = ${hyp} cm</b> (hypoténuse). <br>Calcule la mesure de l'angle ${hat} au degré près.`;
            sol += `sin(${hat}) = ${S1}${S2} / ${S2}${S3} = ${opp} / ${hyp}<br>Angle = arcsin(${opp}/${hyp}) ≈ <b>${ang}°</b>`;
        } else {
            txt += `On donne <b>${S1}${S3} = ${adj} cm</b> (adjacent) et <b>${S1}${S2} = ${opp} cm</b> (opposé). <br>Calcule la mesure de l'angle ${hat} au degré près.`;
            sol += `tan(${hat}) = ${S1}${S2} / ${S1}${S3} = ${opp} / ${adj}<br>Angle = arctan(${opp}/${adj}) ≈ <b>${ang}°</b>`;
        }
    }

    document.getElementById('enonce').innerHTML = txt;
    document.getElementById('solution').innerHTML = sol;
    drawTriangleClean(S1, S2, S3);
}

function drawTriangleClean(S1, S2, S3) {
    const svg = document.getElementById('trigo-svg');
    const rot = [0, 90, 180, 270][Math.floor(Math.random() * 4)];
    const p1 = {x: 80, y: 220}, p2 = {x: 80, y: 80}, p3 = {x: 230, y: 220};

    svg.innerHTML = `
        <g transform="rotate(${rot}, 150, 150)">
            <path d="M ${p1.x} ${p1.y} L ${p2.x} ${p2.y} L ${p3.x} ${p3.y} Z" class="triangle-path" />
            <path d="M 80 205 L 95 205 L 95 220" fill="none" stroke="#2c3e50" stroke-width="2"/>
            
            <text x="${p1.x-25}" y="${p1.y+20}" class="label-svg" transform="rotate(${-rot}, ${p1.x-25}, ${p1.y+20})">${S1}</text>
            <text x="${p2.x-10}" y="${p2.y-15}" class="label-svg" transform="rotate(${-rot}, ${p2.x-10}, ${p2.y-15})">${S2}</text>
            <text x="${p3.x+15}" y="${p3.y+15}" class="label-svg" transform="rotate(${-rot}, ${p3.x+15}, ${p3.y+15})">${S3}</text>
        </g>
    `;
}

function toggleSolution() {
    const s = document.getElementById('solution');
    s.style.display = s.style.display === 'block' ? 'none' : 'block';
}

generate();
</script>
</body>
</html>
