<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réduction Littérale en Couleurs - Medi09</title>
    <script>
        window.MathJax = {
            tex: { 
                inlineMath: [['$', '$']], 
                displayMath: [['$$', '$$']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-top: 0; }
        .menu { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; background: #f0f2f5; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #ddd; }
        .menu-item { display: flex; flex-direction: column; gap: 5px; font-weight: bold; }
        select, input[type="number"], .input-info { padding: 8px; border-radius: 5px; border: 1px solid #ccc; background: white; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gen { background: var(--accent); color: white; }
        .btn-print { background: var(--primary); color: white; }
        .btn-sol { background: var(--success); color: white; }
        .btn-exam { background: var(--purple); color: white; }

        #nom-eleve-container { margin-bottom: 15px; display: none; background: #f3e5f5; padding: 15px; border-radius: 8px; border: 1px solid var(--purple); text-align: center; }
        #exam-result { display: none; font-size: 1.5rem; font-weight: bold; color: var(--purple); margin: 20px; padding: 15px; border: 3px solid var(--purple); border-radius: 10px; text-align: center; }

        .exo-grid { display: grid; gap: 20px; margin-top: 20px; }
        .cols-1 { grid-template-columns: 1fr; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        .exo-card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: #fff; page-break-inside: avoid; }
        .exo-header { font-weight: bold; color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .exo-expression { font-size: 1.3rem; margin: 10px 0; }
        .input-zone { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        .user-input { padding: 8px; width: 180px; border: 2px solid var(--accent); border-radius: 5px; font-size: 0.9rem; }
        .feedback { font-weight: bold; font-size: 0.9rem; }
        .solution { display: none; margin-top: 15px; padding: 15px; background: #fdf6e3; border: 1px solid #e67e22; border-radius: 8px; }
        
        @media print {
            .menu, .input-zone, .btn, .feedback, #nom-eleve-container { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; width: 100%; padding: 0; }
            .exo-card { border: 1px solid #ccc; margin-bottom: 10px; }
            .solution { display: none; background: transparent; }
            body.print-solutions .solution { display: block !important; }
        }
    </style>
</head>
<body id="main-body">

<div class="container">
    <h1>Réduction Littérale</h1>

    <div class="menu">
        <div class="menu-item">
            <label>Type :</label>
            <select id="typeExo">
                <option value="simple">Réduction simple</option>
                <option value="parentheses">Parenthèses & Signes</option>
            </select>
        </div>
        <div class="menu-item">
            <label>Exercices :</label>
            <input type="number" id="nbExo" value="4" min="1" max="10">
        </div>
        <div class="menu-item">
            <label>Colonnes :</label>
            <select id="nbCols">
                <option value="1">1 Colonne</option>
                <option value="2" selected>2 Colonnes</option>
            </select>
        </div>
        <div style="align-self: flex-end; display: flex; gap: 8px;">
            <button id="btn-gen-main" class="btn btn-gen" onclick="generate()">🔄 Générer</button>
            <button id="btn-sol-main" class="btn btn-sol" onclick="toggleAllSolutions()">👁️ Corrigés</button>
            <button id="btn-exam-main" class="btn btn-exam" onclick="startExam()">🎓 Mode Examen</button>
            <button class="btn btn-print" onclick="window.print()">🖨️ Imprimer</button>
            <button id="btn-submit-exam" class="btn btn-exam" style="display:none;" onclick="finishExam()">✅ Terminer</button>
        </div>
    </div>

    <div id="nom-eleve-container">
        <input type="text" id="nom-eleve" class="input-info" placeholder="NOM Prénom" style="width:250px">
        <input type="text" id="classe-eleve" class="input-info" placeholder="Classe (ex: 304)" style="width:100px">
    </div>

    <div id="exam-result"></div>

    <div id="exo-grid" class="exo-grid cols-2"></div>
</div>

<script>
// --- CONFIGURATION GOOGLE SHEETS ---
const WEB_APP_URL = "TON_URL_GOOGLE_SCRIPT_ICI"; 
// ------------------------------------

let currentSolutions = [];
let isExam = false;
const letters = ['a', 'b', 'n', 'y', 't', 'x', 'm', 'p'];

function startExam() {
    isExam = true;
    document.getElementById('nom-eleve-container').style.display = 'block';
    document.getElementById('btn-submit-exam').style.display = 'inline-block';
    document.getElementById('btn-gen-main').style.display = 'none';
    document.getElementById('nbExo').value = 8; // On fixe à 8 exos pour l'examen
    generate();
}

function generate() {
    const type = document.getElementById('typeExo').value;
    const nb = document.getElementById('nbExo').value;
    const grid = document.getElementById('exo-grid');
    grid.innerHTML = '';
    grid.className = "exo-grid cols-" + document.getElementById('nbCols').value;
    currentSolutions = [];
    document.getElementById('exam-result').style.display = 'none';

    for (let i = 0; i < nb; i++) {
        let L = letters[rand(0, letters.length - 1)];
        let exo = (type === 'simple') ? generateSimple(L) : generateComplex(L);
        currentSolutions.push(exo.final);
        
        const card = document.createElement('div');
        card.className = 'exo-card';
        card.innerHTML = `
            <div class="exo-header">Question ${i + 1}</div>
            <div class="exo-expression">$E = ${exo.enonce}$</div>
            <div class="input-zone">
                <input type="text" class="user-input" id="input-${i}" placeholder="Réponse">
                ${!isExam ? `<button class="btn btn-gen" style="padding:5px 10px; font-size:0.8rem;" onclick="check(${i})">OK</button>` : ''}
                <span id="fb-${i}" class="feedback"></span>
            </div>
            <div id="sol-${i}" class="solution">
                $E = \\mathbf{${exo.finalTex}}$
            </div>
        `;
        grid.appendChild(card);
    }
    MathJax.typeset();
}

function check(id) {
    let userVal = document.getElementById("input-" + id).value.toLowerCase().replace(/\s/g, '');
    let target = currentSolutions[id].replace(/\s/g, '').replace('$', '');
    if (userVal.startsWith('+')) userVal = userVal.substring(1);
    if (target.startsWith('+')) target = target.substring(1);
    
    let isCorrect = (userVal === target);
    let fb = document.getElementById("fb-" + id);
    if (fb) {
        fb.innerHTML = isCorrect ? "✅" : "❌";
        fb.style.color = isCorrect ? "var(--success)" : "var(--danger)";
    }
    return isCorrect;
}

function finishExam() {
    const nom = document.getElementById('nom-eleve').value;
    const classe = document.getElementById('classe-eleve').value;
    const nb = currentSolutions.length;

    if(!nom || !classe) {
        alert("Inscris ton NOM et ta CLASSE !");
        return;
    }

    let score = 0;
    for(let i=0; i<nb; i++) {
        if(check(i)) score++;
    }

    const noteFinale = ((score / nb) * 20).toFixed(1);
    const resDiv = document.getElementById('exam-result');
    resDiv.style.display = 'block';
    resDiv.innerHTML = `🏁 Terminé ! Note : ${noteFinale} / 20`;
    
    toggleAllSolutions();
    document.getElementById('btn-submit-exam').style.display = 'none';

    fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
            nom: nom,
            classe: classe,
            note: noteFinale,
            details: "Réduction Littérale"
        })
    });
    alert("Résultats envoyés à M.Antoine !");
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function f(c, p, L, isFirst = false) {
    if (c === 0) return "";
    let res = c > 0 ? (isFirst ? "" : " + ") : (isFirst ? "-" : " - ");
    let absC = Math.abs(c);
    if (absC !== 1 || p === 0) res += absC;
    if (p > 0) res += L;
    return res;
}

function colorF(c, p, L, isFirst = false) {
    if (c === 0) return "";
    let hexColor = (p > 0) ? "3498db" : "e74c3c"; 
    let sign = (c > 0) ? (isFirst ? "" : " + ") : (isFirst ? "-" : " - ");
    let absC = Math.abs(c);
    let term = (absC !== 1 || p === 0) ? absC : "";
    if (p > 0) term += L;
    return sign + "{\\color{#" + hexColor + "}{" + term + "}}";
}

function generateSimple(L) {
    let c1 = rand(-9, 9); if(c1===0) c1=2;
    let n1 = rand(-9, 9);
    let c2 = rand(-9, 9); if(c2===0) c2=-3;
    let n2 = rand(-9, 9);
    let enonce = f(c1, 1, L, true) + f(n1, 0, L) + f(c2, 1, L) + f(n2, 0, L);
    let etapeColor = colorF(c1, 1, L, true) + colorF(c2, 1, L) + colorF(n1, 0, L) + colorF(n2, 0, L);
    let resL = c1 + c2;
    let resN = n1 + n2;
    let finalTex = f(resL, 1, L, true) + f(resN, 0, L, resL===0);
    return { enonce, etapeColor, finalTex: finalTex || "0", final: finalTex.replace(/\s/g, '') };
}

function generateComplex(L) {
    let a = rand(-6, 6); if(a===0) a=1;
    let b = rand(-6, 6);
    let c = rand(-6, 6); if(c===0) c=2;
    let d = rand(-6, 6);
    let s1 = Math.random() > 0.5 ? 1 : -1;
    let s2 = Math.random() > 0.5 ? 1 : -1;
    let startSign = (s1 === -1) ? "-" : "";
    let midSign = (s2 === 1) ? "+" : "-";
    let enonce = startSign + "(" + f(a, 1, L, true) + f(b, 0, L) + ") " + midSign + " (" + f(c, 1, L, true) + f(d, 0, L) + ")";
    let t1_c = s1 * a; let t1_n = s1 * b;
    let t2_c = s2 * c; let t2_n = s2 * d;
    let resL = t1_c + t2_c;
    let resN = t1_n + t2_n;
    let finalTex = f(resL, 1, L, true) + f(resN, 0, L, resL===0);
    return { enonce, finalTex: finalTex || "0", final: finalTex.replace(/\s/g, '') };
}

function toggleAllSolutions() {
    document.querySelectorAll('.solution').forEach(s => s.style.display = (s.style.display === 'block' ? 'none' : 'block'));
}

generate();
</script>
</body>
</html>
