<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur Pythagore Expert - Medi09</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; --danger: #e74c3c; --light: #ecf0f1; --blue: #3498db; --purple: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 1000px; width: 100%; text-align: center; }
        
        .mode-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .mode-btn { padding: 10px 20px; border: 2px solid var(--primary); background: white; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .mode-btn.active { background: var(--primary); color: white; }
        .mode-btn.btn-exam-mode { border-color: var(--purple); color: var(--purple); }
        .mode-btn.btn-exam-mode.active { background: var(--purple); color: white; }

        .opt-container { margin-bottom: 15px; background: var(--light); padding: 15px; border-radius: 8px; font-weight: bold; display: flex; gap: 15px; justify-content: center; align-items: center; flex-wrap: wrap; }
        
        .print-cols { display: grid; gap: 30px; width: 100%; margin-top: 20px; }
        .cols-1 { grid-template-columns: 1fr; }
        .cols-2 { grid-template-columns: 1fr 1fr; }

        .exo-block { border: 1px solid #eee; padding: 20px; border-radius: 10px; page-break-inside: avoid; background: white; text-align: left; }
        .svg-wrap { width: 100%; display: flex; justify-content: center; margin-bottom: 10px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        button.action { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gen { background: var(--blue); color: white; }
        .btn-ans { background: var(--success); color: white; }
        .btn-print { background: var(--primary); color: white; }
        .btn-finish { background: var(--purple); color: white; display: none; }
        
        .answer-zone { margin: 10px 0; padding: 10px; border-top: 1px dashed #ccc; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .user-input { padding: 8px; border: 2px solid var(--primary); border-radius: 5px; width: 100px; text-align: center; font-weight: bold; }
        .feedback { font-weight: bold; margin-left: 10px; }

        .solution { display: none; margin-top: 15px; padding: 15px; background: #f0fff4; border-radius: 8px; border: 1px solid var(--success); font-size: 0.95rem; line-height: 1.6; }
        #score-final { display: none; margin: 20px; padding: 20px; background: var(--primary); color: white; border-radius: 10px; font-size: 1.6rem; font-weight: bold; }

        #nom-eleve-container { margin-bottom: 15px; display: none; }
        .input-nom { padding: 10px; border-radius: 5px; border: 2px solid var(--purple); width: 250px; font-size: 1rem; }

        @media print {
            .mode-selector, .opt-container, .controls, .answer-zone, #score-final, #nom-eleve-container { display: none !important; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>📐 Générateur Pythagore</h1>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('theoreme', this)">Théorème</button>
        <button class="mode-btn" onclick="setMode('reciproque', this)">Réciproque</button>
        <button class="mode-btn" onclick="setMode('mixte', this)">Mixte</button>
        <button class="mode-btn btn-exam-mode" onclick="setMode('examen', this)">🎓 Examen</button>
    </div>

    <div id="nom-eleve-container">
        <input type="text" id="nom-eleve" class="input-nom" placeholder="Ton Nom et Prénom">
    </div>

    <div class="opt-container">
        <div id="theoreme-sub-opts">
            <strong>Côté :</strong>
            <select id="calcType">
                <option value="hypo">Hypoténuse</option>
                <option value="cote">Côté angle droit</option>
                <option value="aleatoire" selected>Aléatoire</option>
            </select>
        </div>
        <span>Quantité :</span>
        <select id="exoQty">
            <option value="1">1</option>
            <option value="4">4</option>
            <option value="6" selected>6</option>
        </select>
    </div>

    <div class="controls">
        <button id="btn-generate" class="action btn-gen" onclick="generateSheet()">🔄 Générer</button>
        <button id="btn-toggle-sol" class="action btn-ans" onclick="toggleSolutions()">👁️ Voir/Cacher Corrigés</button>
        <button id="btn-finish-exam" class="action btn-finish" onclick="finishExam()">✅ Terminer l'Examen</button>
        <button class="action btn-print" onclick="window.print()">Imprimer 🖨️</button>
    </div>

    <div id="score-final"></div>
    <div id="print-wrapper" class="print-cols cols-2"></div>
</div>

<script>
// --- CONFIGURATION GOOGLE SHEETS ---
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx-NQxR8Vx6bMAzDty10VK6U2-oBQ58Awe5NxEOaDcbXBXaPBZJPgBu5PMRQ-2i59KZ/exec"; // REMPLACE PAR TON URL DE DEPLOIEMENT !
// ------------------------------------

let currentMode = 'theoreme';
let answersMap = {};
let isExam = false;

function setMode(m, btn) {
    isExam = (m === 'examen');
    currentMode = isExam ? 'mixte' : m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    document.getElementById('nom-eleve-container').style.display = isExam ? 'block' : 'none';
    document.getElementById('theoreme-sub-opts').style.display = (m === 'reciproque' || isExam) ? 'none' : 'block';
    document.getElementById('btn-finish-exam').style.display = isExam ? 'inline-block' : 'none';
    document.getElementById('btn-generate').style.display = isExam ? 'none' : 'inline-block';
    
    if(isExam) document.getElementById('exoQty').value = "6";
    generateSheet();
}

function generateSheet() {
    const qty = isExam ? 6 : parseInt(document.getElementById('exoQty').value);
    const wrapper = document.getElementById('print-wrapper');
    document.getElementById('score-final').style.display = 'none';
    wrapper.innerHTML = '';
    answersMap = {};

    for (let i = 0; i < qty; i++) {
        const exoDiv = document.createElement('div');
        exoDiv.className = 'exo-block';
        let type;
        if (isExam) {
            if(i < 2) type = 'hypo'; else if(i < 4) type = 'cote'; else type = 'recip';
        } else if (currentMode === 'theoreme') {
            const sel = document.getElementById('calcType').value;
            type = (sel === 'aleatoire') ? (Math.random() > 0.5 ? 'hypo' : 'cote') : sel;
        } else if (currentMode === 'reciproque') { type = 'recip'; }
        else { type = Math.random() < 0.33 ? 'hypo' : (Math.random() < 0.66 ? 'cote' : 'recip'); }

        exoDiv.innerHTML = `
            <div class="svg-wrap"><svg id="svg-${i}" width="320" height="220" viewBox="0 0 400 300"></svg></div>
            <div id="enonce-${i}" style="margin-bottom:10px"></div>
            <div class="answer-zone">
                <input type="text" class="user-input" id="input-${i}" placeholder="${type==='recip'?'oui/non':'Nombre'}">
                ${!isExam ? `<button onclick="checkAnswer(${i})" style="cursor:pointer">OK</button>` : ''}
                <span id="fb-${i}" class="feedback"></span>
            </div>
            <div id="sol-${i}" class="solution"></div>
        `;
        wrapper.appendChild(exoDiv);
        setupExo(i, type);
    }
    MathJax.typesetPromise();
}

// Logique de création d'exo (simplifiée pour l'espace, garde ta version complète ici)
function setupExo(id, type) {
    const L = "ABCDEFGHJKLMNPQRSTUVWXYZ".split("").sort(() => Math.random() - 0.5).slice(0, 3);
    const a = Math.floor(Math.random() * 5) + 3; 
    const b = Math.floor(Math.random() * 5) + 3;
    const svg = document.getElementById('svg-'+id);

    if (type === 'hypo') {
        let res = Math.sqrt(a*a+b*b).toFixed(1);
        answersMap[id] = res;
        document.getElementById('enonce-'+id).innerHTML = `Triangle $${L[0]}${L[1]}${L[2]}$ rectangle en $${L[0]}$. $${L[0]}${L[1]}=${a}$ et $${L[0]}${L[2]}=${b}$. Calcule $${L[1]}${L[2]}$.`;
        document.getElementById('sol-'+id).innerHTML = `Égalité : $${L[1]}${L[2]}^2 = ${L[0]}${L[1]}^2 + ${L[0]}${L[2]}^2$ <br> $${L[1]}${L[2]}^2 = ${a}^2 + ${b}^2 = ${a*a+b*b}$ <br> Résultat : <b>${res}</b>`;
    } else if (type === 'cote') {
        let h = a + 4;
        let res = Math.sqrt(h*h-a*a).toFixed(1);
        answersMap[id] = res;
        document.getElementById('enonce-'+id).innerHTML = `Triangle $${L[0]}${L[1]}${L[2]}$ rectangle en $${L[0]}$. Hypotenuse $${L[1]}${L[2]}=${h}$ et $${L[0]}${L[1]}=${a}$. Calcule $${L[0]}${L[2]}$.`;
        document.getElementById('sol-'+id).innerHTML = `Égalité : $${L[1]}${L[2]}^2 = ${L[0]}${L[1]}^2 + ${L[0]}${L[2]}^2$ <br> $${h}^2 = ${a}^2 + ${L[0]}${L[2]}^2$ <br> $${L[0]}${L[2]}^2 = ${h*h-a*a}$ <br> Résultat : <b>${res}</b>`;
    } else {
        const isR = Math.random() > 0.5;
        let h = isR ? parseFloat(Math.sqrt(a*a+b*b).toFixed(1)) : parseFloat((Math.sqrt(a*a+b*b)+1.5).toFixed(1));
        answersMap[id] = isR ? "oui" : "non";
        document.getElementById('enonce-'+id).innerHTML = `$${L[0]}${L[1]}=${a}$, $${L[0]}${L[2]}=${b}$, $${L[1]}${L[2]}=${h}$. Rectangle ?`;
        document.getElementById('sol-'+id).innerHTML = `Plus long côté : $${h}^2 = ${(h*h).toFixed(2)}$ <br> Somme : $${a}^2+${b}^2 = ${a*a+b*b}$ <br> Rectangle : <b>${isR?'Oui':'Non'}</b>`;
    }
}

function checkAnswer(id) {
    const val = document.getElementById('input-'+id).value.toLowerCase().trim().replace(',', '.');
    const corr = answersMap[id];
    const isC = (corr === "oui" || corr === "non") ? (val === corr) : (Math.abs(parseFloat(val) - parseFloat(corr)) < 0.2);
    document.getElementById('fb-'+id).textContent = isC ? "✅" : "❌";
    document.getElementById('fb-'+id).style.color = isC ? "green" : "red";
    return isC;
}

function finishExam() {
    const nom = document.getElementById('nom-eleve').value;
    if(!nom) { alert("Entre ton nom d'abord !"); return; }

    let points = 0;
    let details = "";
    for(let i=0; i<6; i++) {
        let correct = checkAnswer(i);
        if(correct) points++;
        else details += `Exo ${i+1} faux (réponse: ${document.getElementById('input-'+i).value}). `;
        document.getElementById('sol-'+i).style.display = 'block';
    }
    const note = ((points / 6) * 20).toFixed(1);
    document.getElementById('score-final').style.display = 'block';
    document.getElementById('score-final').innerHTML = `Note : ${note} / 20`;

    // ENVOI AU GOOGLE SHEET
    if(WEB_APP_URL !== "TON_URL_ICI") {
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ nom: nom, note: note, details: details || "Sans fautes" })
        });
        alert("Note envoyée au professeur !");
    }
}
</script>
</body>
</html>
